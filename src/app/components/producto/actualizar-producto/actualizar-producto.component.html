<div *ngIf="mostrarActualizarProducto" class="modal fade show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.8);">
  <div class="modal-dialog modal-dialog-centered" style="min-width: 95%;">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Actualizar Producto</h5>
        <button type="button" class="btn-close" (click)="cerrar()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form *ngIf="productoActualizar" #form="ngForm">
          <div class="row">
            <div class="col-8">
              <div class="row row-cols-2 g-3">
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Nombre</span>
                    <input class="form-control" type="text" [(ngModel)]="productoActualizar.nombre" name="nombre">
                  </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Descripción</span>
                    <input class="form-control" type="text" [(ngModel)]="productoActualizar.descripcion" name="descripcion">
                  </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <span class="input-group-text">Marca</span>
                        <select class="form-select" name="selectMarca" id="selectMarca" [(ngModel)]="productoActualizar.marca.id">
                            <option [ngValue]="0" selected>Selecciona Marca</option>
                            @for (m of marcas; track $index) {
                            <option [ngValue]="m.id">{{m.nombre}}</option>
                            }
                        </select>            
                    </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <span class="input-group-text">Unidad Medida</span>
                        <select class="form-select" name="selectUnidadMedida" id="selectUnidadMedida" [(ngModel)]="productoActualizar.unidadMedida.id">
                            <option [ngValue]="0" selected>Selecciona Unidad Medida</option>
                            @for (u of unidadesMedida; track $index) {
                            <option [ngValue]="u.id">{{u.nombre}}</option>
                            }
                        </select>            
                    </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <span class="input-group-text">Categoria</span>
                        <select class="form-select" name="selectCategoria" id="selectCategoria" [(ngModel)]="productoActualizar.categoria.id">
                            <option [ngValue]="0" selected>Selecciona Categoria</option>
                            @for (c of categorias; track $index) {
                            <option [ngValue]="c.id">{{c.nombre}}</option>
                            }
                        </select>            
                    </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Ganancia</span>
                    <input class="form-control" type="number" [value]="productoActualizar.precio - productoActualizar.costo" name="ganancia" disabled>
                  </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Costo</span>
                    <input class="form-control" type="number" step="0.01" [(ngModel)]="productoActualizar.costo" name="precioCompra">
                  </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Precio</span>
                    <input class="form-control" type="number" step="0.01" [(ngModel)]="productoActualizar.precio" name="precioVenta">
                  </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Stock</span>
                    <input class="form-control" type="number" step="1" [(ngModel)]="productoActualizar.stock" name="stock">
                  </div>
                </div>
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">Stock Minimo</span>
                    <input class="form-control" type="number" step="1" [(ngModel)]="productoActualizar.stockMinimo" name="stockMinimo">
                  </div>
                </div>
              </div>
            </div>
            <div class="col-4">
              <div class="row row-cols-12 g-3">
                  <div class="col-12">
                      <div class="input-group">
                          <span class="input-group-text">Proveedor</span>
                          <select class="form-select" name="selectProveedor" id="selectProveedor" (ngModelChange)="agregarProveedor($event)" [(ngModel)]="selectedProveedor">
                              <option [ngValue]="0">Selecciona Proveedor</option>
                              @for (m of proveedores; track $index) {
                              <option [ngValue]="m.id">{{m.nombre}}</option>
                              }
                          </select>
                      </div>
                  </div>
                  @for (p of productoUpsertDto.idsProveedores; track $index) {
                  <div class="col-12">
                      <div class="input-group">
                      <div class="form-control">{{nombreProveedor(p)}}</div>
                      <button type="button" class="btn btn-danger" (click)="quitarProveedor(p)"><i class="fa-solid fa-trash"></i></button>
                      </div>
                  </div>
                  }
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger me-3" (click)="cerrar()">Cancelar</button>
        <button type="button" class="btn btn-success" (click)="guardarCambios()">Guardar</button>
      </div>
      <!-- <div class="modal-footer">
        <pre>{{productoActualizar | json}}</pre>
      </div>
      <div class="modal-footer">
        <pre>{{productoUpsertDto | json}}</pre>
      </div> -->
    </div>
  </div>
</div>
